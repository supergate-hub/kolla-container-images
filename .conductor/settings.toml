"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
run_mode = "concurrent"

[scripts.run.validate]
command = "python3 scripts/validate-config.py && python3 -m unittest discover -s tests -v"
default = true
icon = "test-tube"

[scripts.run.plan]
command = "python3 scripts/plan-publish.py --profile deployment --release 2025.1 --distro rocky --distro-version 9 --dry-run"
icon = "list-checks"
